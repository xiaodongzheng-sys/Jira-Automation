{% extends "base.html" %}

{% block body %}
  <section class="panel panel-wide glass-panel cloud-home-panel" data-public-home>
    <div class="panel-head">
      <div>
        <h2>Risk PM Workspace</h2>
        <p class="step-copy">Sign in to access Anti-fraud Reports, Version Plan, and Source Code bundles.</p>
      </div>
    </div>

    <div class="dashboard-grid public-home-grid">
      <article class="dashboard-card" data-public-home-sign-in>
        <h3>Sign In Required</h3>
        <p>Approved @npt.sg, @monee.com, and @seamoney.com accounts can sign in with Google.</p>
        <a class="button button-primary" href="{{ url_for('cloud_google_login') if cloud_auth_mode|default(false) else url_for('google_login') }}">Sign in with Google</a>
      </article>
    </div>
  </section>
{% endblock %}

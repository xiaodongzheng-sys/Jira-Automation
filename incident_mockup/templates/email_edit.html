{% extends "base.html" %}

{% block content %}
  <section class="portal-page">
    <section class="surface-card">
      <div class="detail-header">
        <div><h2>Edit Email Management</h2><p class="detail-subtitle">{{ email.id }} · {{ email.title }}</p></div>
      </div>
      <div class="form-grid">
        <div class="field-block"><label>Email ID</label><input class="ant-input" type="text" value="{{ email.id }}" disabled></div>
        <div class="field-block"><label>Status</label><select class="ant-select"><option>{{ email.status }}</option><option>Inactive</option></select></div>
        <div class="field-block"><label>Frequency</label><select class="ant-select"><option>{{ email.frequency }}</option><option>Daily</option><option>Weekly</option><option>Monthly</option></select></div>
        <div class="field-block field-block-full"><label>Email Title</label><input class="ant-input" type="text" value="{{ email.title }}"></div>
        <div class="field-block field-block-full"><label>Email Recipient (To List)</label><textarea class="ant-textarea" rows="2">{{ email.recipient_to }}</textarea></div>
        <div class="field-block field-block-full"><label>Email Recipient (Cc List)</label><textarea class="ant-textarea" rows="2">{{ email.recipient_cc }}</textarea></div>
        <div class="field-block field-block-full"><label>Fixed Content (Non-editable)</label><textarea class="ant-textarea" rows="4" disabled>{{ email.content_fixed }}</textarea></div>
        <div class="field-block field-block-full"><label>Editable Content</label><textarea class="ant-textarea" rows="8">{{ email.content_editable }}</textarea></div>
      </div>
      <div class="form-actions"><button class="ant-btn" type="button">Cancel</button><button class="ant-btn ant-btn-primary" type="button">Submit</button></div>
    </section>
  </section>
{% endblock %}

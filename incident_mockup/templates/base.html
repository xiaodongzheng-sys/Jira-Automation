<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | GRC Portal Demo</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='mockup.css') }}">
  </head>
  <body>
    {% if site_tabs %}
      <div class="page-shell grc-demo-shell">
        <nav class="site-switcher" aria-label="Primary tools">
          <div class="site-switcher-track">
            {% for tab in site_tabs %}
              <a class="site-switcher-tab{% if tab.active %} is-active{% endif %}" href="{{ tab.href }}">{{ tab.label }}</a>
            {% endfor %}
          </div>
        </nav>
      </div>
    {% endif %}
    <header class="portal-header">
      <div class="portal-header-inner">
        <div class="portal-brand">
          <div class="brand-mark">S</div>
          <div class="brand-text">SeaBank</div>
        </div>
        <div class="portal-userbar">
          <form class="user-logout-form" method="post" action="/auth/google/logout">
            <button class="user-logout-button" type="submit">Logout</button>
          </form>
        </div>
      </div>
    </header>

    <div class="app-shell grc-demo-frame">
      <aside class="side-nav">
        <nav class="portal-menu" aria-label="Primary">
          <div class="menu-group is-open">
            <div class="menu-group-title">Governance, Risk &amp; Compliance (GRC)</div>
            <a class="submenu-item {% if request.endpoint in ['outsourcing_overview', 'outsourcing_new', 'outsourcing_detail', 'outsourcing_assessment_detail', 'outsourcing_assessment_new', 'outsourcing_assessment_edit'] %}is-active{% endif %}" href="{{ url_for('outsourcing_overview') }}">Outsourcing Management</a>
            <a class="submenu-item {% if request.endpoint == 'access_control' %}is-active{% endif %}" href="{{ url_for('access_control') }}">GRC Access Control</a>
            <a class="submenu-item {% if request.endpoint == 'authorization' %}is-active{% endif %}" href="{{ url_for('authorization') }}">Authorization Management</a>
            <a class="submenu-item {% if request.endpoint == 'parameter_management' %}is-active{% endif %}" href="{{ url_for('parameter_management') }}">Parameter Management</a>
            <a class="submenu-item {% if request.endpoint == 'email_management' %}is-active{% endif %}" href="{{ url_for('email_management') }}">Email Management</a>
            <a class="submenu-item {% if request.endpoint == 'reports' %}is-active{% endif %}" href="{{ url_for('reports') }}">Report</a>
          </div>
        </nav>
      </aside>

      <main class="main-shell">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="{{ url_for('static', filename='mockup.js') }}"></script>
  </body>
</html>

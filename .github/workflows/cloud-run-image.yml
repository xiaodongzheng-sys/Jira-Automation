name: Build Cloud Run image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloud-run-image.yml"
      - "Dockerfile"
      - "cloudbuild.yaml"
      - "requirements-cloud-run.txt"
      - "app.py"
      - "local_agent.py"
      - "bpmis_jira_tool/**"
      - "config/**"
      - "prd_briefing/**"
      - "static/**"
      - "templates/**"
      - "scripts/build_cloud_run_image.sh"
      - "scripts/lib/team_env.sh"
      - "scripts/lib/cloud_run_image_policy.sh"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cloud-run-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ vars.GCP_PROJECT_ID != '' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'asia-southeast1' }}
      CLOUD_RUN_ARTIFACT_REPOSITORY: ${{ vars.CLOUD_RUN_ARTIFACT_REPOSITORY || 'team-portal' }}
      CLOUD_RUN_IMAGE_NAME: ${{ vars.CLOUD_RUN_IMAGE_NAME || 'team-portal' }}
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        run: |
          GOOGLE_CLOUD_PROJECT="$GCP_PROJECT_ID" \
          CLOUD_RUN_IMAGE_TAG="$GITHUB_SHA" \
          CLOUD_RUN_BUILD_POLL_SECONDS="${CLOUD_RUN_BUILD_POLL_SECONDS:-10}" \
          ./scripts/build_cloud_run_image.sh
